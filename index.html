<body>
<div class="studio-app" id="app">
  <!-- [A11y #6] Skip Navigation -->
  <a href="#mainContent" class="studio-skip-nav">Langsung ke konten utama</a>

  <!-- Header -->
  <div class="studio-header">
    <div class="studio-header-left">
      <div class="studio-header-icon" id="headerIcon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="7" height="18" rx="1.5"/>
          <line x1="11" y1="3" x2="13" y2="3"/>
          <line x1="11" y1="21" x2="13" y2="21"/>
          <rect x="15" y="3" width="7" height="18" rx="1.5"/>
        </svg>
      </div>
      <div>
        <div class="studio-header-title" id="headerTitle">Cover Layout</div>
        <div class="studio-header-subtitle" id="headerSubtitle">Hitung layout cetak cover buku</div>
      </div>
    </div>
    <div class="studio-header-right">
      <!-- [A11y #3] ARIA tab pattern -->
      <div class="studio-tabs" role="tablist" aria-label="Studio tabs">
        <button class="studio-tab active" role="tab" aria-selected="true" aria-controls="cover-layout-studio" id="tab-cover-layout" data-tab="cover-layout" onclick="switchTab('cover-layout')" title="Cover Layout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="18" rx="1.5"/><line x1="11" y1="3" x2="13" y2="3"/><line x1="11" y1="21" x2="13" y2="21"/><rect x="15" y="3" width="7" height="18" rx="1.5"/></svg>
        </button>
        <button class="studio-tab" role="tab" aria-selected="false" aria-controls="paper-cut-studio" id="tab-paper-cut" data-tab="paper-cut" onclick="switchTab('paper-cut')" title="Paper Cut">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/><rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/></svg>
        </button>
        <button class="studio-tab" role="tab" aria-selected="false" aria-controls="kalkulator-isi-studio" id="tab-kalkulator-isi" data-tab="kalkulator-isi" onclick="switchTab('kalkulator-isi')" title="Kalkulator Isi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </button>
        <button class="studio-tab" role="tab" aria-selected="false" aria-controls="referensi-kertas-studio" id="tab-referensi-kertas" data-tab="referensi-kertas" onclick="switchTab('referensi-kertas')" title="Referensi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </button>
      </div>
      <button class="studio-reset-btn" onclick="resetAll()" title="Reset semua input" aria-label="Reset semua input ke default">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <!-- unit toggle moved into custom dim box -->
      <button class="studio-theme-toggle" onclick="toggleTheme()" title="Ganti tema" id="themeBtn" aria-label="Ganti tema gelap/terang">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="studio-help-toggle" onclick="toggleShortcutModal()" title="Keyboard Shortcuts" aria-label="Keyboard Shortcuts">?</button>
    </div>
  </div>

  <!-- [A11y #6] Main content landmark -->
  <main id="mainContent">
  <!-- Cover Layout Studio [A11y #3] -->
  <div id="cover-layout-studio" class="studio-layout" role="tabpanel" aria-labelledby="tab-cover-layout">
    <div class="studio-left-panel" id="coverLeftPanel"></div>
    <div class="studio-right-panel" id="coverRightPanel"></div>
  </div>

  <!-- Paper Cut Studio [A11y #3] -->
  <div id="paper-cut-studio" class="studio-layout hidden" role="tabpanel" aria-labelledby="tab-paper-cut">
    <div class="studio-left-panel" id="paperCutLeftPanel"></div>
    <div class="studio-right-panel" id="paperCutRightPanel"></div>
  </div>

  <!-- Kalkulator Isi Buku Studio -->
  <div id="kalkulator-isi-studio" class="studio-layout hidden" role="tabpanel" aria-labelledby="tab-kalkulator-isi">
    <div class="studio-left-panel" id="kalkulatorIsiLeftPanel"></div>
    <div class="studio-right-panel" id="kalkulatorIsiRightPanel"></div>
  </div>

  <!-- Referensi Kertas Studio -->
  <div id="referensi-kertas-studio" class="hidden" role="tabpanel" aria-labelledby="tab-referensi-kertas" style="padding:22px;overflow-y:auto;max-height:calc(100vh - 130px)">
    <div id="referensiKertasPanel"></div>
  </div>
  </main>

  <!-- Sidebar Curtain Handle (mobile) -->
  <button class="studio-sidebar-toggle" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Buka sidebar" aria-label="Toggle sidebar">
    <div class="studio-sidebar-handle-dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </button>

  <!-- Keyboard Shortcuts Modal -->
  <div id="shortcutModal" class="hidden"></div>

  <!-- BlueBee Footer Branding -->
